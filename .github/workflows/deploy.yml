name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid Node 20 deprecation warnings on checkout/cache actions (see GitHub changelog 2025-09-19)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@9.0.0) — do not set version here
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          GITHUB_PAGES: true

      - name: Verify production bundle
        run: |
          if grep -q 'src="/src/main.js"' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.js — build did not run correctly"
            exit 1
          fi
          if ! grep -q '/Extended-robot-viewer/' dist/index.html; then
            echo "::error::dist/index.html missing GitHub Pages base path"
            exit 1
          fi
          echo "Built entry script:"
          grep -o 'src="[^"]*main[^"]*"' dist/index.html | head -3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # Fallback for Settings → Deploy from branch → gh-pages / (root)
      - name: Publish built dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

  # Preferred: Settings → Pages → Source → GitHub Actions
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (Actions)
        id: deployment
        uses: actions/deploy-pages@v4
